name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to release from"
        required: true
        default: "main"
      tag:
        description: "Release tag, must match desktop/package.json version, for example v0.1.0"
        required: true
      draft:
        description: "Create the GitHub Release as a draft"
        type: boolean
        default: true
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        type: boolean
        default: false

env:
  NODE_VERSION: "20"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            name: windows-x64
            electron_target: win

          - platform: macos-intel
            os: macos-14
            name: macos-intel
            electron_target: mac

          - platform: macos-arm64
            os: macos-14
            name: macos-arm64
            electron_target: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python (for ai-service)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Install desktop dependencies
        run: |
          cd desktop
          npm install

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Build ai-service (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd ai-service
          chmod +x scripts/build-ai-service.sh
          ./scripts/build-ai-service.sh

      - name: Build ai-service (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd ai-service
          scripts\build-ai-service.bat

      - name: Build desktop app (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd desktop
          npm run generate:icons
          npm run prepare:resources
          npx electron-builder --win --x64

      - name: Build desktop app (macOS Intel)
        if: matrix.platform == 'macos-intel'
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
        run: |
          cd desktop
          npm run generate:icons
          npm run prepare:resources
          npx electron-builder --mac --x64

      - name: Build desktop app (macOS ARM64)
        if: matrix.platform == 'macos-arm64'
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
        run: |
          cd desktop
          npm run generate:icons
          npm run prepare:resources
          npx electron-builder --mac --arm64

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Tidy-${{ matrix.name }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.zip
          if-no-files-found: ignore

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: Tidy-${{ matrix.name }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.app
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout for version
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          path: repo

      - name: Validate release tag
        id: version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          VERSION=$(node -p "require('./repo/desktop/package.json').version")
          EXPECTED_TAG="v$VERSION"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match desktop/package.json version $VERSION ($EXPECTED_TAG)."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: |
          ls -R artifacts
          echo "---"
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" \) | head -20

      - name: Flatten artifacts for release
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.ref }}
          name: Tidy ${{ inputs.tag }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
